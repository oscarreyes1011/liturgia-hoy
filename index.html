<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liturgia del Día</title>

<style>
body{
font-family: Arial;
max-width:900px;
margin:auto;
padding:20px;
background:#fafafa;
line-height:1.6;
}

h1{
text-align:center;
}

h2{
text-align:center;
color:#444;
}

.seccion{
margin-top:30px;
}

.cita{
font-weight:bold;
margin-bottom:10px;
}

.respuesta{
font-weight:bold;
color:#6b0000;
}


</style>
</head>

<body>

<h1>✝️ Liturgia del Día</h1>

<div id="contenido">Cargando liturgia...</div>

<script>

fetch("./liturgia.json")
.then(response => response.json())
.then(data => {

console.log("JSON cargado:", data);

let html = "";

html += `<h2>${data.fecha}</h2>`;
html += `<p style="text-align: center;""><b>${data.tiempo_liturgico}</b></p>`;

html += `
<div class="seccion">
<h3>Antífona de Entrada</h3>
<p>${data.antifona_entrada}</p>
</div>
`;

html += `
<div class="seccion">
<h3>Oración Colecta</h3>
<p>${data.oracion_colecta}</p>
</div>
`;

html += `
<div class="seccion">
<h3>Primera Lectura</h3>
<div class="cita">${data.primera_lectura.cita}</div>
<p>${data.primera_lectura.texto}</p>
</div>
`;

html += `
<div class="seccion">
<h3>Salmo Responsorial</h3>
<div class="cita">${data.salmo.cita}</div>
<p class="respuesta">${data.salmo.respuesta}</p>
<p>${data.salmo.texto1}</p>
<p>${data.salmo.texto2}</p>
<p>${data.salmo.texto3}</p>
<p>${data.salmo.texto4}</p>
</div>
`;

if(data.segunda_lectura.cita){
html += `
<div class="seccion">
<h3>Segunda Lectura</h3>
<div class="cita">${data.segunda_lectura.cita}</div>
<p>${data.segunda_lectura.texto}</p>
</div>
`;
}

html += `
<div class="seccion">
<h3>Aclamación antes del Evangelio</h3>
<div class="cita">${data.aclamacion_evangelio.cita}</div>
<p class="respuesta">${data.aclamacion_evangelio.respuesta}</p>
<p>${data.aclamacion_evangelio.texto}</p>
</div>
`;

html += `
<div class="seccion">
<h3>Evangelio</h3>
<div class="cita">${data.evangelio.cita}</div>
<p>${data.evangelio.texto}</p>
</div>
`;

html += `
<div class="seccion">
<h3>Reflexión</h3>
<p>${data.reflexion.texto}</p>
</div>
`;

html += `
<div class="seccion">
<h3>Oración sobre las Ofrendas</h3>
<p>${data.oracion_ofrendas}</p>
</div>
`;

html += `
<div class="seccion">
<h3>Antífona de Comunión</h3>
<p>${data.antifona_comunion}</p>
</div>
`;

html += `
<div class="seccion">
<h3>Oración después de la Comunión</h3>
<p>${data.oracion_comunion}</p>
</div>
`;

document.getElementById("contenido").innerHTML = html;

})
.catch(error => {
document.getElementById("contenido").innerHTML = "Error cargando la liturgia.";
console.error(error);
});

</script>

</body>
</html>
